<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Mohammed - CEO of Cobalt</title>
    <link rel="stylesheet" href="/demos/mockups.css">
    <script src="/demos/mockup-autoscroll.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Cairo:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <style>
        body {
            background-color: transparent !important;
            background-image: none !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* Premium executive glass effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 68, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 68, 255, 0.15);
        }

        /* Hide scrollbar for the phone content */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="mockup-theme--ibrahim min-h-screen flex items-center justify-center p-0 text-white font-sans overflow-hidden">

    <div class="relative w-[340px] h-[720px] bg-surface rounded-[3rem] border-[10px] border-[#151518] shadow-[0_20px_50px_rgba(0,0,0,0.9),0_0_0_1px_rgba(255,255,255,0.05)] flex-shrink-0  overflow-hidden z-10">
        
        <!-- Hardware elements: Dynamic Island -->
        <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-50">
            <div class="w-28 h-6 bg-black rounded-b-3xl relative top-[-2px]"></div>
        </div>
        
        <!-- Phone Screen Content -->
        <div class="relative w-full h-full overflow-y-auto overflow-x-hidden no-scrollbar pb-10">
            
            <div class="absolute top-[-5%] left-1/2 -translate-x-1/2 w-[150%] h-64 bg-cobalt/30 rounded-full blur-[90px] pointer-events-none mix-blend-screen"></div>

            <div class="relative px-5 pt-16 flex flex-col items-center w-full">
                
                <!-- Executive Split Header Card -->
                <div class="w-full p-4 rounded-2xl bg-white/[0.02] border border-white/5 shadow-2xl mb-8 flex items-center gap-4 opacity-0 animate-fade-in-up">
                    <!-- Left: Profile Avatar -->
                    <div class="relative w-16 h-16 rounded-full bg-gradient-to-b from-[#2a2a35] to-[#0A0A0C] border border-cobalt/30 flex items-center justify-center p-0.5 flex-shrink-0 shadow-xl">
                        <div class="w-full h-full rounded-full bg-[#050506] flex items-center justify-center overflow-hidden border border-white/10 shadow-inner relative">
                            <!-- Ibrahim Photo -->
                            <img class="w-full h-full object-cover" src="/demos/assets/ibrahim.webp" alt="Ibrahim Mohammed">
                        </div>
                        <!-- Status Indicator -->
                        <div class="absolute bottom-0 right-0 w-4 h-4 bg-[#030303] rounded-full flex items-center justify-center z-10">
                            <div class="w-2.5 h-2.5 bg-cobalt-light rounded-full shadow-[0_0_8px_rgba(77,136,255,0.8)]"></div>
                        </div>
                    </div>
                    
                    <!-- Right: Info -->
                    <div class="flex flex-col items-start text-left min-w-0 flex-1">
                        <div class="flex items-center gap-1 w-full min-w-0">
                            <h1 class="text-[17px] font-display font-semibold text-white tracking-wide leading-tight truncate">Ibrahim Mohammed</h1>
                            <svg class="w-4 h-4 text-cobalt-light flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <span class="text-[9px] text-cobalt-light font-bold font-sans tracking-wider uppercase mt-0.5 mb-1">CEO @ COBALT</span>
                        <p class="text-[11px] text-gray-500 font-arabic truncate w-full">
                            المؤسس والرئيس التنفيذي للشركة
                        </p>
                    </div>
                </div>

                <!-- Links Container -->
                <div class="w-full flex flex-col gap-3">
                    
                    <!-- Link 1: Cobalt Agency -->
                    <a href="#" class="w-full p-3 rounded-xl bg-[#07070a]/90 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-100 relative overflow-hidden shadow-lg hover:border-cobalt/40">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt/0 via-cobalt/5 to-cobalt/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-cobalt-light/35 group-hover:text-cobalt-light transition-colors text-gray-400">
                                <!-- Cobalt SVG Logo -->
                                <svg class="w-4.5 h-4.5" viewBox="0 0 712 712" fill="currentColor">
                                    <path fill-rule="evenodd" d="M 489 201 A 205 205 0 1 0 489 511 L 464 487 A 170 170 0 1 1 464 227 Z M 459 252 A 106 106 0 1 0 459 464 A 106 106 0 1 0 459 252 Z M 459 288 A 70 70 0 1 1 459 428 A 70 70 0 1 1 459 288 Z"/>
                                </svg>
                            </div>
                            <span class="font-sans font-medium text-gray-300 text-[13px] tracking-wide group-hover:text-white transition-colors">Cobalt Agency</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 2: LinkedIn -->
                    <a href="#" class="w-full p-3 rounded-xl bg-[#07070a]/90 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-200 relative overflow-hidden shadow-lg hover:border-cobalt/40">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt/0 via-cobalt/5 to-cobalt/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-cobalt-light/35 group-hover:text-cobalt-light transition-colors text-gray-400">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                                    <rect x="2" y="9" width="4" height="12"></rect>
                                    <circle cx="4" cy="4" r="2"></circle>
                                </svg>
                            </div>
                            <span class="font-sans font-medium text-gray-300 text-[13px] tracking-wide group-hover:text-white transition-colors">LinkedIn Profile</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 3: X / Twitter -->
                    <a href="#" class="w-full p-3 rounded-xl bg-[#07070a]/90 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-300 relative overflow-hidden shadow-lg hover:border-cobalt/40">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt/0 via-cobalt/5 to-cobalt/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-cobalt-light/35 group-hover:text-cobalt-light transition-colors text-gray-400">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4l11.733 16h4.267l-11.733 -16z"></path>
                                    <path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path>
                                </svg>
                            </div>
                            <span class="font-sans font-medium text-gray-300 text-[13px] tracking-wide group-hover:text-white transition-colors">X (Twitter)</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 4: Book a Call -->
                    <a href="#" class="w-full p-3 rounded-xl bg-[#07070a]/90 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-400 relative overflow-hidden shadow-lg hover:border-cobalt/40">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt/0 via-cobalt/5 to-cobalt/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-cobalt-light/35 group-hover:text-cobalt-light transition-colors text-gray-400">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                    <circle cx="12" cy="15" r="1.5"></circle>
                                </svg>
                            </div>
                            <div class="flex flex-col items-start">
                                <span class="font-sans font-medium text-gray-300 text-[13px] tracking-wide group-hover:text-white transition-colors leading-tight">Book a Call / Consult</span>
                                <span class="font-arabic text-[10px] text-gray-500 group-hover:text-cobalt-light transition-colors">حجز موعد استشاري</span>
                            </div>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                </div></a>

                </div>
            </div>
        </div>
    </div>

    
    
    


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const screen = document.querySelector('.relative.w-full.h-full.overflow-y-auto');
            if (!screen) return;

            // ── 1. Handle Embed Mode (Screen Only) ──
            if (window.location.search.includes('embed=true')) {
                const phone = screen.parentElement;
                if (phone) {
                    // Reset class to clear phone border, notch, and shadow styles
                    phone.className = "relative w-full h-full overflow-hidden z-10";
                }
                const notch = document.querySelector('.absolute.top-0.inset-x-0.h-7');
                if (notch) notch.style.display = 'none';
                
                const content = screen.querySelector('.relative.px-6.pt-20');
                if (content) {
                    content.classList.remove('pt-20');
                    content.classList.add('pt-8');
                }
            }

        });
    </script>

</body>
</html>
