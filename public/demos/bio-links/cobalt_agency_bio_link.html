<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobalt Agency - Premium Bio Link</title>
    <link rel="stylesheet" href="/demos/mockups.css">
    <script src="/demos/mockup-autoscroll.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent !important;
            background-image: none !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* Glass effect utilities tailored for Cobalt */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(37, 99, 235, 0.35); /* Cobalt highlight */
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.15);
        }

        /* Hide scrollbar for the phone content */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="mockup-theme--cobalt min-h-screen flex items-center justify-center p-0 text-white font-sans overflow-hidden">

    <!-- The Phone Mockup Frame -->
    <div class="relative w-[340px] h-[720px] bg-dark-bg rounded-[3rem] border-[10px] border-[#1a1a1c] shadow-[0_20px_50px_rgba(0,0,0,0.8),0_0_0_1px_rgba(255,255,255,0.1)] flex-shrink-0  overflow-hidden z-10">
        
        <!-- Hardware elements: Dynamic Island / Notch -->
        <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-50">
            <div class="w-28 h-6 bg-black rounded-b-3xl relative top-[-2px]"></div>
        </div>
        
        <!-- Phone Screen Content -->
        <div class="relative w-full h-full overflow-hidden no-scrollbar pb-6 flex flex-col justify-between">
            
            <!-- Top ambient glow inside phone (Cobalt tinted) -->
            <div class="absolute top-[-5%] left-1/2 -translate-x-1/2 w-[150%] h-64 bg-cobalt-500/35 rounded-full blur-[90px] pointer-events-none"></div>
            <div class="absolute bottom-[-10%] right-[-20%] w-[120%] h-60 bg-[#0044ff]/10 rounded-full blur-[90px] pointer-events-none"></div>

            <!-- Cyber digital grid lines SVG -->
            <svg class="absolute inset-0 w-full h-full opacity-[0.04] text-cobalt-500 pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" stroke="currentColor">
                <path d="M 0,10 L 100,10 M 0,20 L 100,20 M 0,30 L 100,30 M 0,40 L 100,40 M 0,50 L 100,50 M 0,60 L 100,60 M 0,70 L 100,70 M 0,80 L 100,80 M 0,90 L 100,90" stroke-width="0.3"/>
                <path d="M 10,0 L 10,100 M 20,0 L 20,100 M 30,0 L 30,100 M 40,0 L 40,100 M 50,0 L 50,100 M 60,0 L 60,100 M 70,0 L 70,100 M 80,0 L 80,100 M 90,0 L 90,100" stroke-width="0.3"/>
            </svg>

            <div class="relative px-5 pt-12 flex flex-col items-center flex-1 justify-center">
                
                <!-- Profile Avatar -->
                <div class="relative mb-3 opacity-0 animate-fade-in-up">
                    <div class="absolute inset-0 bg-cobalt-500 rounded-full blur-xl opacity-30"></div>
                    <div class="relative w-18 h-18 rounded-full bg-gradient-to-b from-[#2a2a2e] to-[#111113] border-[1.5px] border-cobalt-500/40 flex items-center justify-center p-0.5 shadow-xl">
                        <!-- Inner dark circle with logo -->
                        <div class="w-full h-full rounded-full bg-[#ffffff] flex items-center justify-center overflow-hidden border border-white/5 shadow-inner">
                            <!-- User's Provided Cobalt Co Logo -->
                            <svg class="w-10 h-10" viewBox="0 0 712 712" role="img" aria-labelledby="title">
                                <path fill="#050505" fill-rule="evenodd" d="M 489 201 A 205 205 0 1 0 489 511 L 464 487 A 170 170 0 1 1 464 227 Z M 459 252 A 106 106 0 1 0 459 464 A 106 106 0 1 0 459 252 Z M 459 288 A 70 70 0 1 1 459 428 A 70 70 0 1 1 459 288 Z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Titles & Tagline -->
                <div class="text-center mb-5 opacity-0 animate-fade-in-up delay-100">
                    <h1 class="text-2xl font-arabic font-extrabold tracking-tight text-white mb-1.5">كوبالت</h1>
                    <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full bg-cobalt-900/35 border border-cobalt-500/30 mb-1.5">
                        <span class="w-1 h-1 rounded-full bg-cobalt-500 animate-pulse"></span>
                        <span class="text-[8px] text-cobalt-500 font-semibold tracking-widest uppercase">Digital Growth</span>
                    </div>
                    <p class="text-[12px] text-gray-400 font-arabic leading-relaxed">
                        نصنع الهوية الرقمية والقنوات الذكية لعملك
                    </p>
                </div>

                <!-- Links Container -->
                <div class="w-full flex flex-col gap-2.5">
                    
                    <!-- Link 1: Website -->
                    <a href="#" class="w-full p-2.5 rounded-xl bg-[#090a10]/95 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-100 hover:border-cobalt-500/40 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt-500/0 via-cobalt-500/10 to-cobalt-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-cobalt-500/10 flex items-center justify-center border border-cobalt-500/20 group-hover:border-cobalt-500/50 group-hover:text-white transition-colors text-cobalt-500">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                            </div>
                            <span class="font-arabic font-bold text-gray-200 text-[12px] group-hover:text-white transition-colors">زيارة موقعنا</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-500 transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 2: Contact Us -->
                    <a href="#" class="w-full p-2.5 rounded-xl bg-[#090a10]/95 border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-200 hover:border-cobalt-500/40 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-r from-cobalt-500/0 via-cobalt-500/10 to-cobalt-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 rounded-lg bg-cobalt-500/10 flex items-center justify-center border border-cobalt-500/20 group-hover:border-cobalt-500/50 group-hover:text-white transition-colors text-cobalt-500">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </div>
                            <span class="font-arabic font-bold text-gray-200 text-[12px] group-hover:text-white transition-colors">احجز زيارة مجانية</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-cobalt-500 transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Grid Layout for Instagram & WhatsApp -->
                    <div class="grid grid-cols-2 gap-3 w-full">
                        <!-- Instagram -->
                        <a href="#" class="p-2.5 rounded-xl bg-[#090a10]/95 border border-white/5 flex flex-col items-center justify-center text-center group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-300 hover:border-cobalt-500/40 relative overflow-hidden">
                            <div class="w-8 h-8 rounded-lg bg-cobalt-500/10 flex items-center justify-center mb-1 border border-cobalt-500/20 group-hover:border-cobalt-500/50 group-hover:text-white transition-colors text-cobalt-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                            </div>
                            <span class="font-arabic font-bold text-gray-300 text-[11px] group-hover:text-white transition-colors">إنستغرام</span>
                        </a>

                        <!-- WhatsApp -->
                        <a href="#" class="p-2.5 rounded-xl bg-[#090a10]/95 border border-white/5 flex flex-col items-center justify-center text-center group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-400 hover:border-cobalt-500/40 relative overflow-hidden">
                            <div class="w-8 h-8 rounded-lg bg-cobalt-500/10 flex items-center justify-center mb-1 border border-cobalt-500/20 group-hover:border-cobalt-500/50 group-hover:text-white transition-colors text-cobalt-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                            </div>
                            <span class="font-arabic font-bold text-gray-300 text-[11px] group-hover:text-white transition-colors">واتساب</span>
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Decorative background elements for the hero section presentation -->
    
    


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const screen = document.querySelector('.relative.w-full.h-full.overflow-y-auto');
            if (!screen) return;

            // ── 1. Handle Embed Mode (Screen Only) ──
            if (window.location.search.includes('embed=true')) {
                const phone = screen.parentElement;
                if (phone) {
                    // Reset class to clear phone border, notch, and shadow styles
                    phone.className = "relative w-full h-full overflow-hidden z-10";
                }
                const notch = document.querySelector('.absolute.top-0.inset-x-0.h-7');
                if (notch) notch.style.display = 'none';
                
                const content = screen.querySelector('.relative.px-6.pt-20');
                if (content) {
                    content.classList.remove('pt-20');
                    content.classList.add('pt-8');
                }
            }

        });
    </script>

</body>
</html>
