<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaber Coffee House - Premium Bio Link</title>
    <link rel="stylesheet" href="/demos/mockups.css">
    <script src="/demos/mockup-autoscroll.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@500;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            background-image: none !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* Glass effect utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(217, 119, 6, 0.3);
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.1);
        }

        /* Hide scrollbar for the phone content */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="mockup-theme--jaber min-h-screen flex items-center justify-center p-0 text-white font-sans overflow-hidden">

    <!-- The Phone Mockup Frame -->
    <div class="relative w-[340px] h-[720px] bg-dark-bg rounded-[3rem] border-[10px] border-[#1a1a1c] shadow-[0_20px_50px_rgba(0,0,0,0.8),0_0_0_1px_rgba(255,255,255,0.1)] flex-shrink-0  overflow-hidden z-10">
        
        <!-- Hardware elements: Dynamic Island / Notch -->
        <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-50">
            <div class="w-28 h-6 bg-black rounded-b-3xl relative top-[-2px]"></div>
        </div>
        
        <!-- Phone Screen Content -->
        <div class="relative w-full h-full overflow-y-auto overflow-x-hidden no-scrollbar pb-10">
            
            <!-- Top ambient glow inside phone -->
            <div class="absolute top-[-5%] left-1/2 -translate-x-1/2 w-[150%] h-64 bg-[#78350f]/35 rounded-full blur-[80px] pointer-events-none"></div>
            <div class="absolute bottom-[10%] left-[-10%] w-[120%] h-60 bg-[#d97706]/10 rounded-full blur-[80px] pointer-events-none"></div>

            <!-- Background Arabic Calligraphy/Steam Lines SVG & Coffee Beans Watermark -->
            <svg class="absolute inset-0 w-full h-full opacity-[0.03] text-coffee-500 pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" stroke="currentColor">
                <path d="M50,0 C30,30 70,60 50,100 M20,0 C40,40 10,70 30,100 M80,0 C60,30 90,75 70,100" stroke-width="0.8"/>
            </svg>
            <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 opacity-[0.02] text-coffee-500 pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
                <!-- Coffee pot / Dallah silhouette shape -->
                <path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm2-5H2v14h16v-6h4V3zm-6 12H4V5h12v10z"/>
            </svg>

            <div class="relative px-6 pt-20 flex flex-col items-center">
                
                <!-- Profile Avatar -->
                <div class="relative mb-5 opacity-0 animate-fade-in-up">
                    <div class="absolute inset-0 bg-coffee-500 rounded-full blur-xl opacity-30"></div>
                    <div class="relative w-24 h-24 rounded-full bg-gradient-to-b from-[#2a2a2e] to-[#111113] border-[1.5px] border-coffee-500/40 flex items-center justify-center p-1 shadow-xl">
                        <!-- Inner dark circle -->
                        <div class="w-full h-full rounded-full bg-dark-bg flex items-center justify-center overflow-hidden border border-white/5">
                            <img class="w-full h-full object-cover" src="/demos/assets/jaber_logo.webp" alt="Jaber Coffee House Logo">
                        </div>
                    </div>
                </div>

                <!-- Titles & Tagline -->
                <div class="text-center mb-8 opacity-0 animate-fade-in-up delay-100">
                    <h1 class="text-3xl font-serif font-bold text-white mb-1.5">محمصة ومقهى جابر</h1>
                    <p class="text-[12px] text-coffee-500 font-sans tracking-widest uppercase mb-1">
                        JABER COFFEE HOUSE
                    </p>
                    <p class="text-[13px] text-gray-400 font-sans leading-relaxed">
                        محمصة ومقهى مختص تقدم أجود أنواع القهوة
                    </p>
                </div>

                <!-- Links Container -->
                <div class="w-full flex flex-col gap-3.5" dir="rtl">
                    
                    <!-- Link 1: Website -->
                    <a href="#" class="w-full p-2.5 rounded-full bg-[#180f0a]/90 border border-coffee-500/20 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-100 relative overflow-hidden shadow-lg hover:border-coffee-500/60">
                        <div class="absolute inset-0 bg-gradient-to-l from-coffee-500/0 via-coffee-500/5 to-coffee-500/0 translate-x-[100%] group-hover:translate-x-[-100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-coffee-500/10 flex items-center justify-center border border-coffee-500/20 group-hover:border-coffee-500/50 group-hover:text-white transition-colors text-coffee-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                            </div>
                            <span class="font-sans font-semibold text-gray-200 text-[13px] group-hover:text-white transition-colors">موقعنا الإلكتروني</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-coffee-500 transform group-hover:-translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
                    </a>

                    <!-- Link 2: Contact Us -->
                    <a href="#" class="w-full p-2.5 rounded-full bg-[#180f0a]/90 border border-coffee-500/20 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-200 relative overflow-hidden shadow-lg hover:border-coffee-500/60">
                        <div class="absolute inset-0 bg-gradient-to-l from-coffee-500/0 via-coffee-500/5 to-coffee-500/0 translate-x-[100%] group-hover:translate-x-[-100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-coffee-500/10 flex items-center justify-center border border-coffee-500/20 group-hover:border-coffee-500/50 group-hover:text-white transition-colors text-coffee-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </div>
                            <span class="font-sans font-semibold text-gray-200 text-[13px] group-hover:text-white transition-colors">اتصل بنا</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-coffee-500 transform group-hover:-translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
                    </a>

                    <!-- Link 3: Instagram -->
                    <a href="#" class="w-full p-2.5 rounded-full bg-[#180f0a]/90 border border-coffee-500/20 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-300 relative overflow-hidden shadow-lg hover:border-coffee-500/60">
                        <div class="absolute inset-0 bg-gradient-to-l from-coffee-500/0 via-coffee-500/5 to-coffee-500/0 translate-x-[100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-coffee-500/10 flex items-center justify-center border border-coffee-500/20 group-hover:border-coffee-500/50 group-hover:text-white transition-colors text-coffee-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                            </div>
                            <span class="font-sans font-semibold text-gray-200 text-[13px] group-hover:text-white transition-colors">حساب الإنستغرام</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-coffee-500 transform group-hover:-translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
                    </a>

                    <!-- Link 4: WhatsApp -->
                    <a href="#" class="w-full p-2.5 rounded-full bg-[#180f0a]/90 border border-coffee-500/20 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-400 relative overflow-hidden shadow-lg hover:border-coffee-500/60">
                        <div class="absolute inset-0 bg-gradient-to-l from-coffee-500/0 via-coffee-500/5 to-coffee-500/0 translate-x-[100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-coffee-500/10 flex items-center justify-center border border-coffee-500/20 group-hover:border-coffee-500/50 group-hover:text-white transition-colors text-coffee-500">
                                <svg class="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </div>
                            <span class="font-sans font-semibold text-gray-200 text-[13px] group-hover:text-white transition-colors">راسلنا على واتساب</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-coffee-500 transform group-hover:-translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
                    </a>

                </div>
            </div>
        </div>
    </div>

    <!-- Decorative background elements for the hero section presentation -->
    
    


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const screen = document.querySelector('.relative.w-full.h-full.overflow-y-auto');
            if (!screen) return;

            // ── 1. Handle Embed Mode (Screen Only) ──
            if (window.location.search.includes('embed=true')) {
                document.body.className = "w-full h-full text-white font-sans overflow-hidden";
                document.documentElement.className = "w-full h-full overflow-hidden";
                const phone = screen.parentElement;
                if (phone) {
                    // Reset class to clear phone border, notch, and shadow styles
                    phone.className = "relative w-full h-full overflow-hidden z-10";
                }
                const notch = document.querySelector('.absolute.top-0.inset-x-0.h-7');
                if (notch) notch.style.display = 'none';
                
                const content = screen.querySelector('.relative.px-6.pt-20');
                if (content) {
                    content.classList.remove('pt-20');
                    content.classList.add('pt-8');
                }
            }

        });
    </script>

</body>
</html>
