<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks - Premium Bio Link</title>
    <link rel="stylesheet" href="/demos/mockups.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <style>
        body {
            background-color: transparent !important;
            background-image: none !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* Premium glass effect utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 98, 65, 0.5);
            box-shadow: 0 0 20px rgba(0, 98, 65, 0.2);
        }

        /* Hide scrollbar for the phone content */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="mockup-theme--starbucks min-h-screen flex items-center justify-center p-0 text-white font-sans overflow-hidden">

    <div class="relative w-[340px] h-[720px] bg-[#09100d] rounded-[3rem] border-[10px] border-[#112019] shadow-[0_20px_50px_rgba(0,0,0,0.9),0_0_0_1px_rgba(255,255,255,0.05)] flex-shrink-0  overflow-hidden z-10">
        
        <!-- Hardware elements: Dynamic Island / Notch -->
        <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-50">
            <div class="w-28 h-6 bg-black rounded-b-3xl relative top-[-2px]"></div>
        </div>
        
        <!-- Phone Screen Content -->
        <div class="relative w-full h-full overflow-y-auto overflow-x-hidden no-scrollbar pb-10">
            
            <!-- Top ambient glow inside phone (Starbucks Green & Warm Amber blend) -->
            <div class="absolute top-[-5%] left-1/2 -translate-x-1/2 w-[150%] h-64 bg-starbucks-green/20 rounded-full blur-[90px] pointer-events-none mix-blend-screen"></div>
            <div class="absolute top-[10%] left-1/3 w-[120%] h-60 bg-[#8b5a2b]/15 rounded-full blur-[90px] pointer-events-none mix-blend-screen"></div>

            <!-- Background Steam Lines SVG & Coffee Watermark -->
            <svg class="absolute inset-0 w-full h-full opacity-[0.03] text-starbucks-green pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" stroke="currentColor">
                <path d="M15,100 C30,70 10,40 25,0 M45,100 C60,80 40,50 55,0 M75,100 C90,70 70,40 85,0" stroke-width="1"/>
            </svg>
            <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 opacity-[0.015] text-starbucks-green pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
                <path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm2-5H2v14h16v-6h4V3zm-6 12H4V5h12v10z"/>
            </svg>

            <div class="relative px-6 pt-20 flex flex-col items-center">
                
                <!-- Profile Avatar -->
                <div class="relative mb-6 opacity-0 animate-fade-in-up">
                    <div class="absolute inset-0 bg-starbucks-green rounded-full blur-xl opacity-40"></div>
                    <div class="relative w-24 h-24 rounded-full bg-gradient-to-b from-[#1E3932] to-[#0B0B0B] border border-starbucks-green/30 flex items-center justify-center p-1 shadow-2xl">
                        <!-- Inner dark circle -->
                        <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center overflow-hidden border border-white/5 shadow-inner relative">
                            <img class="w-full h-full object-cover z-10" src="/demos/assets/starbucks_logo.webp" alt="Starbucks Logo">
                        </div>
                    </div>
                </div>

                <!-- Titles & Tagline -->
                <div class="text-center mb-10 opacity-0 animate-fade-in-up delay-100">
                    <h1 class="text-3xl font-serif font-bold italic tracking-wide text-white mb-2">Starbucks</h1>
                    <p class="text-[13px] text-gray-300 font-sans tracking-wide mb-2 italic">
                        "To inspire and nurture the human spirit."
                    </p>
                    <div class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full bg-[#1b3c30] border border-starbucks-green/30">
                        <span class="w-1.5 h-1.5 rounded-full bg-starbucks-gold animate-pulse"></span>
                        <span class="text-[9px] text-starbucks-gold font-semibold font-sans tracking-widest uppercase">More Than Coffee</span>
                    </div>
                </div>

                <!-- Links Container -->
                <div class="w-full flex flex-col gap-4">
                    
                    <!-- Link 1: Order Ahead -->
                    <a href="#" class="w-full p-2.5 rounded-tr-[1.5rem] rounded-bl-[1.5rem] rounded-tl-md rounded-br-md bg-[#0d1b15]/95 border-l-[3.5px] border-l-starbucks-green border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-100 relative overflow-hidden shadow-lg hover:border-l-starbucks-gold">
                        <div class="absolute inset-0 bg-gradient-to-r from-starbucks-green/0 via-starbucks-green/5 to-starbucks-green/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-starbucks-green/20 flex items-center justify-center border border-starbucks-green/20 group-hover:border-starbucks-green/50 group-hover:text-starbucks-gold transition-colors text-starbucks-green">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                            </div>
                            <span class="font-sans font-medium text-gray-200 text-[14px] tracking-wide group-hover:text-white transition-colors">Order Ahead</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-starbucks-gold transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 2: Starbucks Rewards -->
                    <a href="#" class="w-full p-2.5 rounded-tr-[1.5rem] rounded-bl-[1.5rem] rounded-tl-md rounded-br-md bg-[#0d1b15]/95 border-l-[3.5px] border-l-starbucks-gold border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-200 relative overflow-hidden shadow-lg hover:border-l-starbucks-green">
                        <div class="absolute inset-0 bg-gradient-to-r from-starbucks-gold/0 via-starbucks-gold/5 to-starbucks-gold/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-starbucks-gold/20 flex items-center justify-center border border-starbucks-gold/20 group-hover:border-starbucks-gold/50 group-hover:text-starbucks-green transition-colors text-starbucks-gold">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            </div>
                            <span class="font-sans font-medium text-gray-200 text-[14px] tracking-wide group-hover:text-white transition-colors">Starbucks® Rewards</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-starbucks-green transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 3: Our Menu -->
                    <a href="#" class="w-full p-2.5 rounded-tr-[1.5rem] rounded-bl-[1.5rem] rounded-tl-md rounded-br-md bg-[#0d1b15]/95 border-l-[3.5px] border-l-starbucks-green border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-300 relative overflow-hidden shadow-lg hover:border-l-starbucks-gold">
                        <div class="absolute inset-0 bg-gradient-to-r from-starbucks-green/0 via-starbucks-green/5 to-starbucks-green/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-starbucks-green/20 flex items-center justify-center border border-starbucks-green/20 group-hover:border-starbucks-green/50 group-hover:text-starbucks-gold transition-colors text-starbucks-green">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                            </div>
                            <span class="font-sans font-medium text-gray-200 text-[14px] tracking-wide group-hover:text-white transition-colors">Menu & Merchandise</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-starbucks-gold transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 4: Store Locator -->
                    <a href="#" class="w-full p-2.5 rounded-tr-[1.5rem] rounded-bl-[1.5rem] rounded-tl-md rounded-br-md bg-[#0d1b15]/95 border-l-[3.5px] border-l-starbucks-green border border-white/5 flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-400 relative overflow-hidden shadow-lg hover:border-l-starbucks-gold">
                        <div class="absolute inset-0 bg-gradient-to-r from-starbucks-green/0 via-starbucks-green/5 to-starbucks-green/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-2.5 relative z-10">
                            <div class="w-9 h-9 rounded-full bg-starbucks-green/20 flex items-center justify-center border border-starbucks-green/20 group-hover:border-starbucks-green/50 group-hover:text-starbucks-gold transition-colors text-starbucks-green">
                                <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            </div>
                            <span class="font-sans font-medium text-gray-200 text-[14px] tracking-wide group-hover:text-white transition-colors">Find a Store</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-starbucks-gold transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                </div>>
            </div>
        </div>
    </div>

    <!-- Decorative background elements for the hero section presentation -->
    
    


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const screen = document.querySelector('.relative.w-full.h-full.overflow-y-auto');
            if (!screen) return;

            // ── 1. Handle Embed Mode (Screen Only) ──
            if (window.location.search.includes('embed=true')) {
                const phone = screen.parentElement;
                if (phone) {
                    // Reset class to clear phone border, notch, and shadow styles
                    phone.className = "relative w-full h-full overflow-hidden z-10";
                }
                const notch = document.querySelector('.absolute.top-0.inset-x-0.h-7');
                if (notch) notch.style.display = 'none';
                
                const content = screen.querySelector('.relative.px-6.pt-20');
                if (content) {
                    content.classList.remove('pt-20');
                    content.classList.add('pt-8');
                }
            }

        });
    </script>

</body>
</html>
