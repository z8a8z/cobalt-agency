<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW - Premium Bio Link</title>
    <link rel="stylesheet" href="/demos/mockups.css">
    <script src="/demos/mockup-autoscroll.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    
    <style>
        body {
            background-color: transparent !important;
            background-image: none !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        
        /* Premium glass effect utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 102, 177, 0.4);
            box-shadow: 0 0 25px rgba(0, 102, 177, 0.15);
        }

        /* Hide scrollbar for the phone content */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Carbon fiber texture */
        .carbon-bg {
            background-color: #050507;
            background-image: 
                linear-gradient(45deg, #0d0d11 25%, transparent 25%), 
                linear-gradient(-45deg, #0d0d11 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #0d0d11 75%), 
                linear-gradient(-45deg, transparent 75%, #0d0d11 75%);
            background-size: 8px 8px;
            background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
        }

        /* Staggered animation delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="mockup-theme--bmw min-h-screen flex items-center justify-center p-0 text-white font-sans overflow-hidden">

    <div class="relative w-[340px] h-[720px] bg-bmw-dark rounded-[3rem] border-[10px] border-[#1c1d24] shadow-[0_20px_50px_rgba(0,0,0,0.9),0_0_0_1px_rgba(255,255,255,0.05)] flex-shrink-0  overflow-hidden z-10">
        
        <!-- Hardware elements: Dynamic Island / Notch -->
        <div class="absolute top-0 inset-x-0 h-7 flex justify-center z-50">
            <div class="w-28 h-6 bg-black rounded-b-3xl relative top-[-2px]"></div>
        </div>
        
        <!-- Phone Screen Content -->
        <div class="relative w-full h-full overflow-y-auto overflow-x-hidden no-scrollbar pb-10 carbon-bg">
            
            <!-- Top ambient glow inside phone (BMW Blue & i-Blue blend) -->
            <div class="absolute top-[-5%] left-1/2 -translate-x-1/2 w-[150%] h-64 bg-bmw-blue/25 rounded-full blur-[90px] pointer-events-none mix-blend-screen"></div>
            <div class="absolute top-[20%] left-[-20%] w-[100%] h-48 bg-bmw-light/10 rounded-full blur-[80px] pointer-events-none mix-blend-screen"></div>

            <!-- Background Racing Speed Lines SVG -->
            <svg class="absolute inset-0 w-full h-full opacity-[0.05] text-bmw-light pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" fill="none" stroke="currentColor">
                <line x1="-20" y1="20" x2="120" y2="90" stroke-width="2" stroke-dasharray="8 4"/>
                <line x1="-20" y1="40" x2="120" y2="110" stroke-width="1" stroke-dasharray="12 6"/>
                <line x1="-20" y1="0" x2="120" y2="70" stroke-width="1.5"/>
            </svg>
            <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 opacity-[0.02] text-bmw-light pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
                <!-- Steering wheel shape -->
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2h2v1.93zm4.79-4.14C16.8 14.8 15 13.5 15 12h5c0 1.58-.51 3.04-1.21 4.21zM12 4c3.86 0 7 3.14 7 7h-5c0-1.1-.9-2-2-2s-2 .9-2 2H5c0-3.86 3.14-7 7-7z"/>
            </svg>

            <div class="relative px-6 pt-20 flex flex-col items-start w-full">
                
                <div class="relative mb-5 opacity-0 animate-fade-in-up self-start">
                    <div class="absolute inset-0 bg-bmw-blue rounded-full blur-xl opacity-30"></div>
                    <div class="relative w-20 h-20 rounded-full bg-gradient-to-b from-[#1C1C1E] to-[#0B0B0B] border border-bmw-blue/30 flex items-center justify-center p-1 shadow-2xl">
                        <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center overflow-hidden border border-white/10 shadow-inner relative">
                            <img class="w-full h-full object-cover z-10" src="/demos/assets/bmw_logo.webp" alt="BMW Logo">
                        </div>
                    </div>
                </div>

                <div class="text-left mb-8 opacity-0 animate-fade-in-up delay-100 w-full">
                    <h1 class="text-3xl font-display font-extrabold tracking-tight text-white mb-1 uppercase">BMW</h1>
                    <p class="text-[12px] text-gray-400 font-sans tracking-wide mb-2">
                        Sheer Driving Pleasure.
                    </p>
                    <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-sm bg-bmw-blue/20 border border-bmw-blue/40">
                        <span class="w-1.5 h-1.5 bg-[#4c9eeb] animate-pulse"></span>
                        <span class="text-[9px] text-[#4c9eeb] font-bold font-display tracking-widest uppercase">M Performance</span>
                    </div>
                </div>

                <div class="w-full flex flex-col gap-3.5">
                    
                    <!-- Link 1: Build Your BMW -->
                    <a href="#" class="w-full p-3 rounded-none bg-[#090b0e] border border-white/5 border-l-[4px] border-l-bmw-blue flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-100 relative overflow-hidden shadow-lg hover:border-l-bmw-light">
                        <div class="absolute inset-0 bg-gradient-to-r from-bmw-blue/0 via-bmw-blue/5 to-bmw-blue/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-bmw-blue/50 group-hover:text-bmw-light transition-colors text-gray-400">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                            </div>
                            <span class="font-display font-medium text-gray-200 text-[13px] tracking-wide uppercase group-hover:text-white transition-colors">Build Your BMW</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-bmw-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 2: Book a Test Drive -->
                    <a href="#" class="w-full p-3 rounded-none bg-[#090b0e] border border-white/5 border-l-[4px] border-l-bmw-blue flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-200 relative overflow-hidden shadow-lg hover:border-l-bmw-light">
                        <div class="absolute inset-0 bg-gradient-to-r from-bmw-blue/0 via-bmw-blue/5 to-bmw-blue/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-bmw-blue/50 group-hover:text-bmw-light transition-colors text-gray-400">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <circle cx="12" cy="12" r="4"></circle>
                                    <line x1="21.17" y1="8" x2="12" y2="8"></line>
                                    <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
                                    <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
                                </svg>
                            </div>
                            <span class="font-display font-medium text-gray-200 text-[13px] tracking-wide uppercase group-hover:text-white transition-colors">Book a Test Drive</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-bmw-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 3: My BMW App -->
                    <a href="#" class="w-full p-3 rounded-none bg-[#090b0e] border border-white/5 border-l-[4px] border-l-bmw-blue flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-300 relative overflow-hidden shadow-lg hover:border-l-bmw-light">
                        <div class="absolute inset-0 bg-gradient-to-r from-bmw-blue/0 via-bmw-blue/5 to-bmw-blue/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-bmw-blue/50 group-hover:text-bmw-light transition-colors text-gray-400">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                                </svg>
                            </div>
                            <span class="font-display font-medium text-gray-200 text-[13px] tracking-wide uppercase group-hover:text-white transition-colors">My BMW App</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-bmw-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                    <!-- Link 4: Find a Dealer -->
                    <a href="#" class="w-full p-3 rounded-none bg-[#090b0e] border border-white/5 border-l-[4px] border-l-bmw-blue flex items-center justify-between group transition-all duration-300 transform opacity-0 animate-fade-in-up delay-400 relative overflow-hidden shadow-lg hover:border-l-bmw-light">
                        <div class="absolute inset-0 bg-gradient-to-r from-bmw-blue/0 via-bmw-blue/5 to-bmw-blue/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-8 h-8 bg-white/5 flex items-center justify-center border border-white/5 group-hover:border-bmw-blue/50 group-hover:text-bmw-light transition-colors text-gray-400">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                            </div>
                            <span class="font-display font-medium text-gray-200 text-[13px] tracking-wide uppercase group-hover:text-white transition-colors">Find a Dealer</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-600 group-hover:text-bmw-light transform group-hover:translate-x-1 transition-all relative z-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
                    </a>

                </div>
            </div>
        </div>
    </div>

    
    


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const screen = document.querySelector('.relative.w-full.h-full.overflow-y-auto');
            if (!screen) return;

            // ── 1. Handle Embed Mode (Screen Only) ──
            if (window.location.search.includes('embed=true')) {
                const phone = screen.parentElement;
                if (phone) {
                    // Reset class to clear phone border, notch, and shadow styles
                    phone.className = "relative w-full h-full overflow-hidden z-10";
                }
                const notch = document.querySelector('.absolute.top-0.inset-x-0.h-7');
                if (notch) notch.style.display = 'none';
                
                const content = screen.querySelector('.relative.px-6.pt-20');
                if (content) {
                    content.classList.remove('pt-20');
                    content.classList.add('pt-8');
                }
            }

        });
    </script>

</body>
</html>
