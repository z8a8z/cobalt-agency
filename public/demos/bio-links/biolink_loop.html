<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bio Link Loop Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #3897f0;
      --coffee: #D97706;
      --bg:     #050505;
      --surface:#111113;
      --ig-bg:  #0a0a0a;
      --muted:  #8e8e8e;
      --border: rgba(255,255,255,0.12);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Cairo', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      color: #fff;
    }

    .scale-container {
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      width: 360px;
      height: 100%;
      overflow: hidden;
    }

    /* ─── Root scene ─────────────────────────────────── */
    .scene {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ig-bg);
    }

    /* ─── PHASE 1: Instagram UI ──────────────────────── */
    .ig-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .ig-screen.exit {
      opacity: 0;
      transform: translateY(-28px);
      pointer-events: none;
    }

    /* Status bar */
    .ig-statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px 4px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .ig-statusbar-icons {
      display: flex; gap: 5px; align-items: center;
    }
    .ig-statusbar-icons svg { opacity: 0.9; }

    /* IG nav bar */
    .ig-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .ig-topbar-username {
      font-size: 15px;
      font-weight: 700;
      font-family: -apple-system, sans-serif;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .ig-topbar-icons {
      display: flex; gap: 14px; align-items: center;
    }
    .ig-topbar-icons svg { color: #fff; }

    /* Profile header */
    .ig-profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 16px 14px;
      flex-shrink: 0;
    }
    .ig-avatar-ring {
      width: 74px; height: 74px;
      border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      flex-shrink: 0;
    }
    .ig-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--ig-bg);
      border: 2.5px solid var(--ig-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .ig-avatar-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .ig-stats {
      display: flex; gap: 18px; flex: 1;
    }
    .ig-stat {
      display: flex; flex-direction: column; align-items: center;
    }
    .ig-stat-num {
      font-size: 15px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    .ig-stat-label {
      font-size: 11px; color: var(--muted);
      font-family: -apple-system, sans-serif;
    }

    /* Bio area */
    .ig-bio {
      padding: 0 16px 10px;
      flex-shrink: 0;
    }
    .ig-bio-name {
      font-size: 13px; font-weight: 700;
      font-family: -apple-system, sans-serif;
      color: #fff; margin-bottom: 3px;
    }
    .ig-bio-text {
      font-size: 12px; color: rgba(255,255,255,0.72);
      font-family: -apple-system, sans-serif;
      line-height: 1.5;
    }

    /* ─── The bio link button ─── */
    .ig-bio-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: -apple-system, sans-serif;
      color: var(--blue);
      cursor: pointer;
      position: relative;
      text-decoration: none;
      transition: color 0.2s;
    }
    .ig-bio-link svg { flex-shrink: 0; }

    /* ripple that expands on click */
    .ig-bio-link::after {
      content: '';
      position: absolute;
      inset: -5px -8px;
      border-radius: 8px;
      background: rgba(56, 151, 240, 0.15);
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.25s, transform 0.3s;
    }
    .ig-bio-link.tapping::after {
      opacity: 1;
      transform: scale(1);
    }

    /* Finger cursor */
    .finger {
      position: absolute;
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transform: scale(0.6);
      transition:
        left 0.55s cubic-bezier(0.25,1,0.5,1),
        top  0.55s cubic-bezier(0.25,1,0.5,1),
        opacity 0.3s ease,
        transform 0.3s ease;
    }
    .finger.visible  { opacity: 1; transform: scale(1); }
    .finger.pressing { transform: scale(0.78); opacity: 0.95; }

    /* Action buttons row */
    .ig-actions {
      display: flex; gap: 6px;
      padding: 0 14px 12px;
      flex-shrink: 0;
    }
    .ig-btn {
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      font-family: -apple-system, sans-serif;
      cursor: default;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .ig-btn--follow { flex: 1; background: var(--blue); border-color: var(--blue); }
    .ig-btn--msg    { flex: 1; }
    .ig-btn--more   { width: 30px; flex: none; }

    /* Highlights row */
    .ig-highlights {
      display: flex; gap: 14px;
      padding: 0 14px 12px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .ig-highlight {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      flex-shrink: 0;
    }
    .ig-highlight-ring {
      width: 54px; height: 54px;
      border-radius: 50%;
      padding: 2px;
      background: rgba(255,255,255,0.12);
    }
    .ig-highlight-circle {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
    }
    .ig-highlight-circle svg { color: var(--muted); }
    .ig-highlight span {
      font-size: 10px; color: var(--muted);
      font-family: -apple-system, sans-serif;
    }

    /* Posts grid */
    .ig-posts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5px;
      flex: 1;
      overflow: hidden;
    }
    .ig-post {
      aspect-ratio: 1;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .ig-post-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(105deg,
        transparent 20%,
        rgba(255,255,255,0.04) 50%,
        transparent 80%
      );
      background-size: 200% 100%;
      background-position: 48% 0;
    }
    /* Give each post a slightly different shade */
    .ig-post:nth-child(2n)  { background: #161616; }
    .ig-post:nth-child(3n)  { background: #0e0e0e; }

    /* Coffee gradient tones for some cells */
    .ig-post:nth-child(1)   { background: linear-gradient(135deg,#1a100a,#0a0805); }
    .ig-post:nth-child(4)   { background: linear-gradient(135deg,#0d0d0d,#181007); }
    .ig-post:nth-child(7)   { background: linear-gradient(135deg,#130d08,#080605); }

    /* ─── Transition flash ──────────────────────────── */
    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.15s ease;
    }
    .flash.on { opacity: 0.18; }

    /* ─── PHASE 2: Bio Link page ────────────────────── */
    .biolink-screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #050505;
      opacity: 0;
      transform: translateY(32px);
      pointer-events: none;
    }
    .biolink-screen::-webkit-scrollbar { display: none; }

    /* iframe fills the full screen */
    .biolink-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: transparent;
    }

    /* ── Bio page internals ─── */
    .bl-ambient-top {
      position: absolute;
      top: -10%;
      left: 50%; transform: translateX(-50%);
      width: 180%;
      height: 260px;
      background: radial-gradient(circle, rgba(120,53,15,0.38), transparent 68%);
      filter: blur(42px);
      pointer-events: none;
    }
    .bl-ambient-bot {
      position: absolute;
      bottom: 8%;
      left: -10%;
      width: 120%;
      height: 200px;
      background: radial-gradient(circle, rgba(217,119,6,0.1), transparent 66%);
      filter: blur(52px);
      pointer-events: none;
    }
    .bl-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 32px;
      gap: 0;
    }

    /* Avatar */
    .bl-avatar-ring {
      width: 82px; height: 82px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #d97706 0%, #78350f 100%);
      margin-bottom: 14px;
      position: relative;
    }
    .bl-avatar-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217,119,6,0.28), transparent 68%);
      filter: blur(8px);
    }
    .bl-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--bg);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .bl-avatar-inner img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }

    /* Name & sub */
    .bl-name {
      font-family: 'Cairo', sans-serif;
      font-size: 22px; font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 3px;
    }
    .bl-sub {
      font-family: -apple-system, sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--coffee);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 5px;
    }
    .bl-tagline {
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    /* Links */
    .bl-links {
      width: 100%;
      display: flex; flex-direction: column; gap: 10px;
      direction: rtl;
    }
    .bl-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 99px;
      border: 1px solid rgba(217,119,6,0.2);
      background: rgba(24,15,10,0.9);
      gap: 10px;
      text-decoration: none;
      transition: border-color 0.25s, background 0.25s;
      opacity: 0;
      transform: translateY(12px);
      animation: none;
    }
    .bl-link.visible {
      animation: blLinkIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes blLinkIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .bl-link-icon {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(217,119,6,0.1);
      border: 1px solid rgba(217,119,6,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--coffee); flex-shrink: 0;
    }
    .bl-link-label {
      font-family: 'Cairo', sans-serif;
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.88);
      flex: 1;
    }
    .bl-link-arrow {
      color: rgba(255,255,255,0.25);
    }

    /* Cobalt watermark */
    .bl-watermark {
      margin-top: 28px;
      font-family: -apple-system, sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
      text-align: center;
    }
    .bl-watermark span { color: rgba(56,151,240,0.55); }
  </style>
</head>

<script>
  function adjustScale() {
    const container = document.getElementById('scaleContainer');
    if (!container) return;
    const width = window.innerWidth;
    const height = window.innerHeight;
    const targetWidth = 360;
    const scale = width / targetWidth;
    container.style.transform = `scale(${scale})`;
    container.style.width = `${targetWidth}px`;
    container.style.height = `${height / scale}px`;
  }
  window.addEventListener('resize', adjustScale);
  window.addEventListener('DOMContentLoaded', adjustScale);
  adjustScale();

(function() {
  const finger         = document.getElementById('finger');
  const bioLinkBtn     = document.getElementById('bioLinkBtn');
  const igScreen       = document.getElementById('igScreen');
  const biolinkScreen  = document.getElementById('biolinkScreen');
  const flash          = document.getElementById('flash');

  const wait = (duration) => new Promise((resolve) => window.setTimeout(resolve, duration));
  let cycleVersion = 0;

  function setInstant(el, props) {
    el.style.transition = 'none';
    Object.assign(el.style, props);
    el.getBoundingClientRect();
  }

  function animateTo(el, props, duration = 380) {
    el.style.transition = `opacity ${duration}ms cubic-bezier(0.16,1,0.3,1), transform ${duration}ms cubic-bezier(0.16,1,0.3,1), left ${duration}ms cubic-bezier(0.16,1,0.3,1), top ${duration}ms cubic-bezier(0.16,1,0.3,1)`;
    Object.assign(el.style, props);
  }

  function resetAll() {
    setInstant(igScreen,       { opacity: '1', transform: 'translateY(0)',    pointerEvents: 'auto' });
    setInstant(biolinkScreen,  { opacity: '0', transform: 'translateY(32px)', pointerEvents: 'none' });
    setInstant(finger,         { opacity: '0', transform: 'scale(0.6)' });
    setInstant(flash,          { opacity: '0' });
    bioLinkBtn.classList.remove('tapping');
  }

  function getBtnPos() {
    let el = bioLinkBtn;
    let x = 0;
    let y = 0;
    const scene = document.querySelector('.scene');
    while (el && el !== scene) {
      x += el.offsetLeft;
      y += el.offsetTop;
      el = el.offsetParent;
    }
    return {
      x: x + bioLinkBtn.offsetWidth / 2,
      y: y + bioLinkBtn.offsetHeight / 2,
    };
  }

  async function runCycle(version) {
    while (version === cycleVersion && !document.hidden) {
      resetAll();
      await wait(900);
      if (version !== cycleVersion || document.hidden) break;

      const pos = getBtnPos();
      setInstant(finger, {
        left: `${pos.x + 48}px`,
        top: `${pos.y - 30}px`,
        opacity: '0',
        transform: 'scale(0.65)',
      });
      animateTo(finger, { opacity: '1', transform: 'scale(1)' }, 220);
      await wait(260);
      if (version !== cycleVersion || document.hidden) break;

      animateTo(finger, { left: `${pos.x - 13}px`, top: `${pos.y - 13}px` }, 460);
      await wait(520);
      if (version !== cycleVersion || document.hidden) break;

      bioLinkBtn.classList.add('tapping');
      animateTo(finger, { transform: 'scale(0.76)' }, 120);
      animateTo(flash, { opacity: '0.18' }, 100);
      await wait(150);
      if (version !== cycleVersion || document.hidden) break;

      bioLinkBtn.classList.remove('tapping');
      animateTo(finger, { opacity: '0' }, 140);
      animateTo(flash, { opacity: '0' }, 180);
      animateTo(igScreen, { opacity: '0', transform: 'translateY(-18px)', pointerEvents: 'none' }, 360);
      animateTo(biolinkScreen, { opacity: '1', transform: 'translateY(0)', pointerEvents: 'none' }, 440);
      await wait(2_700);
      if (version !== cycleVersion || document.hidden) break;

      animateTo(biolinkScreen, { opacity: '0', transform: 'translateY(-14px)' }, 360);
      await wait(440);
    }
  }

  function startCycle() {
    cycleVersion += 1;
    runCycle(cycleVersion);
  }

  window.addEventListener('DOMContentLoaded', () => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      igScreen.style.display = 'none';
      biolinkScreen.style.opacity = '1';
      biolinkScreen.style.transform = 'translateY(0)';
      biolinkScreen.style.pointerEvents = 'none';
      return;
    }

    startCycle();
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      startCycle();
    } else {
      cycleVersion += 1;
    }
  });
})()


</script>
</body>
</html>
